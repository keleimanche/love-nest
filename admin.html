<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔐 管理后台 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e8e8e8;
        }
        
        .login-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-icon { font-size: 60px; margin-bottom: 20px; }
        .login-title { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: #fff; }
        .login-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            font-family: inherit;
        }
        .login-input:focus { border-color: #f2a7b3; }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f2a7b3, #e88798);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .login-error { color: #ff6b6b; font-size: 14px; margin-top: 15px; display: none; }
        
        .admin-panel { display: none; }
        
        .admin-header {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .admin-title { font-size: 20px; font-weight: bold; }
        .logout-btn {
            background: rgba(255,100,100,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .logout-btn:hover { background: rgba(255,100,100,0.3); }
        
        .admin-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f2a7b3;
        }
        
        .quote-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .quote-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .quote-input:focus { border-color: #f2a7b3; }
        .add-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-btn:hover { transform: scale(1.05); }
        
        .quote-list { list-style: none; }
        .quote-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .quote-text { flex: 1; font-size: 14px; line-height: 1.5; }
        .quote-actions { display: flex; gap: 8px; }
        .edit-btn {
            background: rgba(100,150,255,0.2);
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            color: #6495ed;
            cursor: pointer;
            font-size: 12px;
        }
        .edit-btn:hover { background: rgba(100,150,255,0.3); }
        .delete-btn {
            background: rgba(255,100,100,0.2);
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 12px;
        }
        .delete-btn:hover { background: rgba(255,100,100,0.3); }
        
        .empty-hint {
            text-align: center;
            color: rgba(255,255,255,0.4);
            padding: 30px;
            font-size: 14px;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-item {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #f2a7b3; }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            transition: 0.2s;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <div class="login-icon">🔐</div>
        <div class="login-title">管理后台</div>
        <input type="password" class="login-input" id="passwordInput" placeholder="请输入管理密码" maxlength="20">
        <button class="login-btn" id="loginBtn">登 录</button>
        <div class="login-error" id="loginError">密码错误，请重试</div>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="admin-header">
        <div class="admin-title">🎛️ 管理后台</div>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
    
    <div class="admin-content">
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="quoteCount">0</div>
                <div class="stat-label">情话总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="diaryCount">0</div>
                <div class="stat-label">碎碎念</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="storyCount">0</div>
                <div class="stat-label">故事数</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">💌 情话管理</div>
            <div class="quote-input-row">
                <input type="text" class="quote-input" id="newQuoteInput" placeholder="输入新的情话..." maxlength="100">
                <button class="add-btn" id="addQuoteBtn">添加</button>
            </div>
            <ul class="quote-list" id="quoteList">
                <li class="empty-hint">加载中...</li>
            </ul>
        </div>
    </div>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="story.html" class="nav-item"><span class="nav-icon">📖</span>故事</a>
    <a href="admin.html" class="nav-item active"><span class="nav-icon">🔐</span>管理</a>
</div>

<script>
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyALmikJZXqjjqPmqZ3PKeERMsKKrxtgr64",
    authDomain: "love-nest-1536d.firebaseapp.com",
    databaseURL: "https://love-nest-1536d-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "love-nest-1536d",
    storageBucket: "love-nest-1536d.firebasestorage.app",
    messagingSenderId: "346144764535",
    appId: "1:346144764535:web:0cc944b724bdfce5a38c72"
};

const ADMIN_PASSWORD = "loveyou1314";

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const quotesRef = db.ref('loveQuotes');
const diaryRef = db.ref('diary');
const storyBooksRef = db.ref('storyBooks');

const loginScreen = document.getElementById('loginScreen');
const adminPanel = document.getElementById('adminPanel');
const passwordInput = document.getElementById('passwordInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const logoutBtn = document.getElementById('logoutBtn');
const quoteList = document.getElementById('quoteList');
const newQuoteInput = document.getElementById('newQuoteInput');
const addQuoteBtn = document.getElementById('addQuoteBtn');
const quoteCountEl = document.getElementById('quoteCount');
const diaryCountEl = document.getElementById('diaryCount');
const storyCountEl = document.getElementById('storyCount');

function login() {
    const password = passwordInput.value;
    if (password === ADMIN_PASSWORD) {
        loginScreen.style.display = 'none';
        adminPanel.style.display = 'block';
        loadQuotes();
        loadStats();
        localStorage.setItem('adminAuth', 'true');
    } else {
        loginError.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();
    }
}

function logout() {
    localStorage.removeItem('adminAuth');
    loginScreen.style.display = 'flex';
    adminPanel.style.display = 'none';
    passwordInput.value = '';
}

function addQuote() {
    const text = newQuoteInput.value.trim();
    if (!text) {
        alert('请输入情话内容');
        return;
    }
    
    quotesRef.push({
        text: text,
        createdAt: Date.now()
    }).then(() => {
        newQuoteInput.value = '';
        newQuoteInput.focus();
    }).catch((err) => {
        alert('添加失败: ' + err.message);
    });
}

function deleteQuote(key) {
    if (confirm('确定删除这条情话吗？')) {
        quotesRef.child(key).remove();
    }
}

function editQuote(key, oldText) {
    const newText = prompt('编辑情话:', oldText);
    if (newText && newText.trim() && newText.trim() !== oldText) {
        quotesRef.child(key).update({ text: newText.trim() });
    }
}

function loadQuotes() {
    quotesRef.on('value', (snapshot) => {
        const quotes = [];
        snapshot.forEach((child) => {
            quotes.push({ key: child.key, ...child.val() });
        });
        
        quoteCountEl.textContent = quotes.length;
        
        if (quotes.length === 0) {
            quoteList.innerHTML = '<li class="empty-hint">暂无情话，添加一些吧~</li>';
            return;
        }
        
        quoteList.innerHTML = quotes.map((q) => `
            <li class="quote-item">
                <span class="quote-text">${escapeHtml(q.text)}</span>
                <div class="quote-actions">
                    <button class="edit-btn" onclick="editQuote('${q.key}', '${escapeHtml(q.text).replace(/'/g, "\\'")}')">编辑</button>
                    <button class="delete-btn" onclick="deleteQuote('${q.key}')">删除</button>
                </div>
            </li>
        `).join('');
    });
}

function loadStats() {
    diaryRef.on('value', (snapshot) => {
        const data = snapshot.val();
        diaryCountEl.textContent = data ? Object.keys(data).length : 0;
    });
    
    storyBooksRef.on('value', (snapshot) => {
        const data = snapshot.val();
        storyCountEl.textContent = data ? Object.keys(data).length : 0;
    });
}

function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function(m) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m];
    });
}

loginBtn.onclick = login;
passwordInput.onkeypress = (e) => { if (e.key === 'Enter') login(); };
logoutBtn.onclick = logout;
addQuoteBtn.onclick = addQuote;
newQuoteInput.onkeypress = (e) => { if (e.key === 'Enter') addQuote(); };

if (localStorage.getItem('adminAuth') === 'true') {
    loginScreen.style.display = 'none';
    adminPanel.style.display = 'block';
    loadQuotes();
    loadStats();
}
</script>
</body>
</html>
