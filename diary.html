<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📝 碎碎念 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #fef0f5 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .page-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(242, 167, 179, 0.12);
        }
        .page-icon { font-size: 48px; margin-bottom: 8px; }
        .page-title { font-size: 22px; font-weight: 700; color: #d46b7a; }
        .page-subtitle { font-size: 12px; color: #b4868f; margin-top: 4px; }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 20px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        
        .input-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .input-row input {
            flex: 1; border: 1.5px solid #f0ced5; background: #fffafb;
            padding: 12px 16px; border-radius: 30px; font-size: 14px;
            outline: none; transition: 0.2s; font-family: inherit;
        }
        .input-row input:focus { border-color: #f2a7b3; box-shadow: 0 0 0 3px rgba(242, 167, 179, 0.15); }
        
        button {
            border: none; background: #f2a7b3; color: white;
            font-weight: 600; padding: 0 24px; border-radius: 30px;
            font-size: 14px; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        button:active { transform: scale(0.96); }
        
        .diary-list { list-style: none; max-height: 60vh; overflow-y: auto; }
        .diary-item {
            background: #fff9fb; border-radius: 16px; padding: 12px 14px;
            margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start;
        }
        .diary-content { flex: 1; }
        .diary-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
        .diary-meta { font-size: 11px; color: #caa2ab; margin-top: 6px; }
        .delete-btn {
            background: none; color: #ce8f9b; font-size: 18px;
            padding: 0 6px; cursor: pointer; border: none;
        }
        .empty-hint { text-align: center; color: #ccb0b6; padding: 40px 20px; font-size: 14px; }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: #c4939d; font-size: 11px; transition: 0.2s;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-icon">📝</div>
        <div class="page-title">云端碎碎念</div>
        <div class="page-subtitle">两人实时同步 · 记录日常点滴</div>
    </div>

    <div class="card">
        <div class="input-row">
            <input type="text" id="diaryInput" placeholder="写下想说的话... 💭" maxlength="200" autocomplete="off">
            <button id="addBtn">发布</button>
        </div>
        <ul class="diary-list" id="diaryList"></ul>
    </div>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item active"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="games.html" class="nav-item"><span class="nav-icon">🎮</span>游戏</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    console.log('🚀 碎碎念启动...');
    
    initFirebase();
    setupHeartEffect();

    const database = getDb();
    console.log('📊 database:', database);
    
    if (!database) {
        console.error('❌ Firebase未初始化');
        alert('Firebase连接失败，请刷新页面重试');
    }
    
    const diaryRef = database.ref('diary');
    const listEl = document.getElementById('diaryList');
    const inputEl = document.getElementById('diaryInput');
    const addBtn = document.getElementById('addBtn');

    function addToList(key, data) {
        if (document.getElementById(`d-${key}`)) return;
        const li = document.createElement('li');
        li.id = `d-${key}`;
        li.className = 'diary-item';
        const time = data.timestamp ? new Date(data.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '刚刚';
        li.innerHTML = `
            <div class="diary-content">
                <div class="diary-text">${escapeHtml(data.text)}</div>
                <div class="diary-meta">${time}</div>
            </div>
            <button class="delete-btn" data-key="${key}">🗑️</button>
        `;
        li.querySelector('.delete-btn').onclick = (e) => {
            e.stopPropagation();
            if (confirm('确定删除？')) diaryRef.child(key).remove();
        };
        listEl.prepend(li);
    }

    diaryRef.on('child_added', (snap) => addToList(snap.key, snap.val()));
    diaryRef.on('child_removed', (snap) => {
        const el = document.getElementById(`d-${snap.key}`);
        if (el) el.remove();
    });

    function publish() {
        console.log('📝 发布按钮被点击');
        const text = inputEl.value.trim();
        console.log('内容:', text);
        
        if (!text) {
            alert('请输入内容');
            return;
        }
        if (text.length > 200) { 
            alert('不超过200字哦~'); 
            return; 
        }
        
        console.log('📤 写入Firebase...');
        diaryRef.push({ text, timestamp: firebase.database.ServerValue.TIMESTAMP }).then(() => {
            console.log('✅ 发布成功');
            inputEl.value = '';
            inputEl.focus();
        }).catch((err) => {
            console.error('❌ 发布失败:', err);
            alert('发布失败: ' + err.message);
        });
    }

    addBtn.onclick = publish;
    inputEl.onkeypress = (e) => { if (e.key === 'Enter') publish(); };
    
    console.log('✅ 碎碎念就绪');
</script>
</body>
</html>
