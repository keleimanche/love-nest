<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🗺️ 我们的地图与里程碑 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #e8f5e9 0%, #f1f8e9 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 100px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .page-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(76, 175, 80, 0.12);
        }
        .page-icon { font-size: 48px; margin-bottom: 8px; }
        .page-title { font-size: 22px; font-weight: 700; color: #5d8a66; }
        .page-subtitle { font-size: 12px; color: #7da886; margin-top: 4px; }
        
        .stats-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .stat-item { flex: 1; }
        .stat-value { font-size: 24px; font-weight: 700; color: #5d8a66; }
        .stat-label { font-size: 10px; color: #7da886; margin-top: 4px; }
        
        .section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-btn {
            background: #5d8a66;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .add-btn:hover { background: #4a7355; }
        
        /* 地图折叠区域 */
        .map-collapse {
            border-top: 1px dashed #d4e8d4;
            margin-top: 12px;
            padding-top: 12px;
        }
        .map-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px;
            background: #f8fff8;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .map-toggle-text {
            font-size: 12px;
            font-weight: 600;
            color: #5d8a66;
        }
        .map-toggle-icon {
            font-size: 14px;
            transition: transform 0.3s;
        }
        .map-toggle-icon.open {
            transform: rotate(180deg);
        }
        .map-content {
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        .map-content.show {
            display: block;
        }
        .province-row {
            margin-bottom: 10px;
        }
        .province-label {
            font-size: 10px;
            font-weight: 600;
            color: #7da886;
            margin-bottom: 6px;
        }
        .city-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .city-chip {
            padding: 4px 10px;
            background: #f8fff8;
            border: 1px solid #d4e8d4;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .city-chip:hover {
            border-color: #5d8a66;
        }
        .city-chip.visited {
            background: #fff5f5;
            border-color: #e74c3c;
            color: #e74c3c;
            font-weight: 600;
        }
        
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .badge-item {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #f8fff8, #f0f8f0);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6px;
            border: 2px solid #d4e8d4;
            transition: 0.2s;
        }
        .badge-item:hover { transform: scale(1.05); border-color: #5d8a66; }
        .badge-icon { font-size: 24px; margin-bottom: 3px; }
        .badge-name { font-size: 8px; color: #5d8a66; font-weight: 600; line-height: 1.2; }
        .badge-locked { opacity: 0.3; filter: grayscale(1); }
        
        .milestone-list { display: flex; flex-direction: column; gap: 8px; }
        .milestone-item {
            background: #f8fff8;
            border-radius: 14px;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            transition: 0.2s;
        }
        .milestone-item:hover { background: #f0fff0; }
        .milestone-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #5d8a66, #4a7355);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .milestone-content { flex: 1; }
        .milestone-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .milestone-meta { font-size: 10px; color: #7da886; }
        .milestone-delete {
            background: none;
            border: none;
            font-size: 16px;
            color: #ccc;
            cursor: pointer;
            padding: 4px;
            transition: 0.2s;
        }
        .milestone-delete:hover { color: #d46b7a; }
        
        .wish-list { display: flex; flex-direction: column; gap: 8px; }
        .wish-item {
            background: #fffef0;
            border-radius: 14px;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            border: 2px dashed #e8dca0;
            transition: 0.2s;
        }
        .wish-item.completed {
            background: #f0fff0;
            border: 2px solid #5d8a66;
            border-style: solid;
        }
        .wish-pin { font-size: 28px; flex-shrink: 0; }
        .wish-content { flex: 1; }
        .wish-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .wish-meta { font-size: 10px; color: #7da886; }
        .wish-actions { display: flex; flex-direction: column; gap: 4px; }
        .wish-btn {
            background: #5d8a66;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 10px;
            cursor: pointer;
            font-family: inherit;
        }
        .wish-btn.skip { background: #ccc; }
        
        .empty-hint {
            text-align: center;
            color: #7da886;
            padding: 20px;
            font-size: 12px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
            color: #5d8a66;
        }
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #d4e8d4;
            border-radius: 14px;
            font-size: 13px;
            font-family: inherit;
            background: #fafbfc;
        }
        .form-input:focus, .form-select:focus { border-color: #5d8a66; outline: none; }
        
        .type-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .type-option {
            padding: 8px 12px;
            border: 1.5px solid #d4e8d4;
            border-radius: 14px;
            font-size: 11px;
            cursor: pointer;
            background: white;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .type-option.selected {
            border-color: #5d8a66;
            background: #f0fff0;
            color: #5d8a66;
        }
        
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 18px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .modal-btn.primary { background: #5d8a66; color: white; }
        .modal-btn.secondary { background: #f0f0f0; color: #666; }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #c4939d;
            font-size: 11px;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-icon">🗺️</div>
        <div class="page-title">我们的地图与里程碑</div>
        <div class="page-subtitle">记录一起走过的路 · 收集专属徽章</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="milestoneCount">0</div>
            <div class="stat-label">里程碑</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="badgeCount">0</div>
            <div class="stat-label">徽章</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="visitedCount">0</div>
            <div class="stat-label">城市</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">🏅 徽章墙</span>
        </div>
        <div class="badge-grid" id="badgeGrid"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">📍 里程碑</span>
            <button class="add-btn" id="addMilestoneBtn">+ 添加</button>
        </div>
        <div class="milestone-list" id="milestoneList">
            <div class="empty-hint">还没有里程碑记录~</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">🎯 愿望地点</span>
            <button class="add-btn" id="addWishBtn">+ 添加</button>
        </div>
        <div class="wish-list" id="wishList">
            <div class="empty-hint">添加想去的地方吧~</div>
        </div>
        
        <!-- 可折叠的城市地图 -->
        <div class="map-collapse">
            <div class="map-toggle" id="mapToggle">
                <span class="map-toggle-text">🗺️ 点亮足迹城市 (<span id="cityCount">0</span>/34)</span>
                <span class="map-toggle-icon" id="toggleIcon">▼</span>
            </div>
            <div class="map-content" id="mapContent"></div>
        </div>
    </div>
</div>

<!-- 添加里程碑弹窗 -->
<div class="modal" id="milestoneModal">
    <div class="modal-content">
        <div class="modal-title">📍 添加里程碑</div>
        
        <div class="form-group">
            <label class="form-label">类型</label>
            <div class="type-options" id="typeOptions">
                <div class="type-option selected" data-type="place"><span>📍</span>地点</div>
                <div class="type-option" data-type="movie"><span>🎬</span>电影</div>
                <div class="type-option" data-type="food"><span>🍜</span>美食</div>
                <div class="type-option" data-type="activity"><span>🎯</span>活动</div>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">名称</label>
            <input type="text" class="form-input" id="milestoneNameInput" placeholder="例：看了一场《泰坦尼克号》">
        </div>
        
        <div class="form-group">
            <label class="form-label">日期</label>
            <input type="date" class="form-input" id="milestoneDateInput">
        </div>
        
        <div class="form-group">
            <label class="form-label">备注（可选）</label>
            <input type="text" class="form-input" id="milestoneNoteInput" placeholder="写下难忘的细节...">
        </div>
        
        <div class="modal-btns">
            <button class="modal-btn secondary" id="cancelMilestoneBtn">取消</button>
            <button class="modal-btn primary" id="saveMilestoneBtn">保存</button>
        </div>
    </div>
</div>

<!-- 添加愿望弹窗 -->
<div class="modal" id="wishModal">
    <div class="modal-content">
        <div class="modal-title">🎯 添加愿望地点</div>
        
        <div class="form-group">
            <label class="form-label">想去的地方/想做的事</label>
            <input type="text" class="form-input" id="wishNameInput" placeholder="例：一起去迪士尼">
        </div>
        
        <div class="form-group">
            <label class="form-label">备注（可选）</label>
            <input type="text" class="form-input" id="wishNoteInput" placeholder="为什么想去这里...">
        </div>
        
        <div class="modal-btns">
            <button class="modal-btn secondary" id="cancelWishBtn">取消</button>
            <button class="modal-btn primary" id="saveWishBtn">添加</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="games.html" class="nav-item"><span class="nav-icon">🎮</span>游戏</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    initFirebase();
    
    const database = getDb();
    const milestoneRef = database.ref('milestones');
    const wishRef = database.ref('wishes');
    const visitedRef = database.ref('visitedCities');
    
    const TYPE_CONFIG = {
        place: { icon: '📍', badge: '🗺️', badgeName: '足迹徽章' },
        movie: { icon: '🎬', badge: '🎬', badgeName: '电影达人' },
        food: { icon: '🍜', badge: '🍜', badgeName: '美食家' },
        activity: { icon: '🎯', badge: '🏆', badgeName: '活动达人' }
    };

    const SPECIAL_BADGES = [
        { id: 'first', icon: '🌟', name: '第一步', condition: (m) => m.length >= 1 },
        { id: 'movie1', icon: '🎬', name: '第一场电影', condition: (m) => m.filter(x => x.type === 'movie').length >= 1 },
        { id: 'place5', icon: '🗺️', name: '小旅行家', condition: (m) => m.filter(x => x.type === 'place').length >= 5 },
        { id: 'movie3', icon: '🎥', name: '电影迷', condition: (m) => m.filter(x => x.type === 'movie').length >= 3 },
        { id: 'food5', icon: '🍜', name: '美食探索家', condition: (m) => m.filter(x => x.type === 'food').length >= 5 },
        { id: 'total10', icon: '🏅', name: '里程碑达人', condition: (m) => m.length >= 10 },
        { id: 'wish1', icon: '🎯', name: '愿望实现', condition: (m, w) => w.filter(x => x.completed).length >= 1 },
        { id: 'wish5', icon: '🏆', name: '梦想成真', condition: (m, w) => w.filter(x => x.completed).length >= 5 }
    ];
    
    const CITIES_BY_PROVINCE = {
        '直辖市': ['北京', '上海', '天津', '重庆'],
        '广东': ['广州', '深圳', '东莞'],
        '浙江': ['杭州', '宁波', '温州'],
        '江苏': ['南京', '苏州', '无锡'],
        '四川': ['成都', '绵阳'],
        '湖北': ['武汉', '宜昌'],
        '陕西': ['西安'],
        '山东': ['青岛', '济南'],
        '福建': ['厦门', '福州'],
        '湖南': ['长沙', '张家界'],
        '辽宁': ['沈阳', '大连'],
        '黑龙江': ['哈尔滨'],
        '云南': ['昆明', '大理', '丽江'],
        '海南': ['三亚', '海口'],
        '其他': ['拉萨', '乌鲁木齐', '桂林']
    };

    let milestones = [];
    let wishes = [];
    let visitedCities = [];
    let selectedType = 'place';
    let mapOpen = false;

    const badgeGrid = document.getElementById('badgeGrid');
    const milestoneList = document.getElementById('milestoneList');
    const wishList = document.getElementById('wishList');
    const mapContent = document.getElementById('mapContent');

    function render() {
        const unlockedBadges = SPECIAL_BADGES.filter(b => b.condition(milestones, wishes));
        
        document.getElementById('milestoneCount').textContent = milestones.length;
        document.getElementById('badgeCount').textContent = unlockedBadges.length;
        document.getElementById('visitedCount').textContent = visitedCities.length;
        document.getElementById('cityCount').textContent = visitedCities.length;

        badgeGrid.innerHTML = '';
        SPECIAL_BADGES.forEach(badge => {
            const unlocked = unlockedBadges.includes(badge);
            const div = document.createElement('div');
            div.className = `badge-item ${unlocked ? '' : 'badge-locked'}`;
            div.innerHTML = `
                <span class="badge-icon">${badge.icon}</span>
                <span class="badge-name">${badge.name}</span>
            `;
            badgeGrid.appendChild(div);
        });

        if (milestones.length === 0) {
            milestoneList.innerHTML = '<div class="empty-hint">还没有里程碑记录~</div>';
        } else {
            milestoneList.innerHTML = '';
            milestones.sort((a, b) => b.date - a.date).forEach(m => {
                const div = document.createElement('div');
                div.className = 'milestone-item';
                const config = TYPE_CONFIG[m.type] || TYPE_CONFIG.place;
                div.innerHTML = `
                    <div class="milestone-icon">${config.icon}</div>
                    <div class="milestone-content">
                        <div class="milestone-title">${escapeHtml(m.name)}</div>
                        <div class="milestone-meta">${new Date(m.date).toLocaleDateString('zh-CN')}${m.note ? ' · ' + escapeHtml(m.note) : ''}</div>
                    </div>
                    <button class="milestone-delete" data-id="${m.id}">🗑️</button>
                `;
                div.querySelector('.milestone-delete').onclick = (e) => {
                    e.stopPropagation();
                    if (confirm('删除这个里程碑？')) {
                        milestoneRef.child(m.id).remove();
                    }
                };
                milestoneList.appendChild(div);
            });
        }

        if (wishes.length === 0) {
            wishList.innerHTML = '<div class="empty-hint">添加想去的地方吧~</div>';
        } else {
            wishList.innerHTML = '';
            wishes.forEach(w => {
                const div = document.createElement('div');
                div.className = `wish-item ${w.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <span class="wish-pin">${w.completed ? '🚩' : '📌'}</span>
                    <div class="wish-content">
                        <div class="wish-title">${escapeHtml(w.name)}</div>
                        <div class="wish-meta">${w.completed ? '✅ 已完成 · ' + new Date(w.completedTime).toLocaleDateString('zh-CN') : (w.note ? escapeHtml(w.note) : '待实现')}</div>
                    </div>
                    ${!w.completed ? `
                        <div class="wish-actions">
                            <button class="wish-btn" data-id="${w.id}">✅ 达成</button>
                            <button class="wish-btn skip" data-id="${w.id}" data-skip="1">删除</button>
                        </div>
                    ` : ''}
                `;
                if (!w.completed) {
                    div.querySelector('.wish-btn[data-id]').onclick = (e) => {
                        wishRef.child(w.id).update({
                            completed: true,
                            completedTime: Date.now()
                        });
                    };
                    div.querySelector('.wish-btn.skip').onclick = (e) => {
                        if (confirm('删除这个愿望？')) {
                            wishRef.child(w.id).remove();
                        }
                    };
                }
                wishList.appendChild(div);
            });
        }
        
        renderMap();
    }
    
    function renderMap() {
        mapContent.innerHTML = '';
        
        Object.entries(CITIES_BY_PROVINCE).forEach(([province, cities]) => {
            const row = document.createElement('div');
            row.className = 'province-row';
            row.innerHTML = `
                <div class="province-label">${province}</div>
                <div class="city-chips">
                    ${cities.map(city => {
                        const isVisited = visitedCities.some(v => v.name === city);
                        return `<span class="city-chip ${isVisited ? 'visited' : ''}" onclick="toggleCity('${city}')">${city}</span>`;
                    }).join('')}
                </div>
            `;
            mapContent.appendChild(row);
        });
    }
    
    window.toggleCity = function(cityName) {
        const isVisited = visitedCities.some(v => v.name === cityName);
        
        if (isVisited) {
            const city = visitedCities.find(c => c.name === cityName);
            if (city) {
                visitedRef.child(city.id).remove();
            }
        } else {
            visitedRef.push({
                name: cityName,
                timestamp: Date.now()
            });
        }
    };
    
    function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, function(m) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m];
        });
    }

    milestoneRef.on('value', (snap) => {
        milestones = [];
        snap.forEach(c => milestones.push({ id: c.key, ...c.val() }));
        render();
    });

    wishRef.on('value', (snap) => {
        wishes = [];
        snap.forEach(c => wishes.push({ id: c.key, ...c.val() }));
        render();
    });
    
    visitedRef.on('value', (snap) => {
        visitedCities = [];
        snap.forEach(c => visitedCities.push({ id: c.key, ...c.val() }));
        render();
    });

    document.getElementById('addMilestoneBtn').onclick = () => {
        document.getElementById('milestoneModal').classList.add('show');
        document.getElementById('milestoneDateInput').value = new Date().toISOString().slice(0, 10);
    };

    document.getElementById('cancelMilestoneBtn').onclick = () => {
        document.getElementById('milestoneModal').classList.remove('show');
    };

    document.querySelectorAll('.type-option').forEach(el => {
        el.onclick = () => {
            document.querySelectorAll('.type-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedType = el.dataset.type;
        };
    });

    document.getElementById('saveMilestoneBtn').onclick = () => {
        const name = document.getElementById('milestoneNameInput').value.trim();
        const date = document.getElementById('milestoneDateInput').value;
        const note = document.getElementById('milestoneNoteInput').value.trim();
        
        if (!name || !date) {
            alert('请填写名称和日期~');
            return;
        }

        milestoneRef.push({
            type: selectedType,
            name,
            date: new Date(date).getTime(),
            note,
            createTime: Date.now()
        });

        document.getElementById('milestoneNameInput').value = '';
        document.getElementById('milestoneNoteInput').value = '';
        document.getElementById('milestoneModal').classList.remove('show');
    };

    document.getElementById('addWishBtn').onclick = () => {
        document.getElementById('wishModal').classList.add('show');
    };

    document.getElementById('cancelWishBtn').onclick = () => {
        document.getElementById('wishModal').classList.remove('show');
    };

    document.getElementById('saveWishBtn').onclick = () => {
        const name = document.getElementById('wishNameInput').value.trim();
        const note = document.getElementById('wishNoteInput').value.trim();
        
        if (!name) {
            alert('请填写愿望~');
            return;
        }

        wishRef.push({
            name,
            note,
            completed: false,
            createTime: Date.now()
        });

        document.getElementById('wishNameInput').value = '';
        document.getElementById('wishNoteInput').value = '';
        document.getElementById('wishModal').classList.remove('show');
    };
    
    document.getElementById('mapToggle').onclick = () => {
        mapOpen = !mapOpen;
        document.getElementById('mapContent').classList.toggle('show', mapOpen);
        document.getElementById('toggleIcon').classList.toggle('open', mapOpen);
    };

    render();
</script>
</body>
</html>
