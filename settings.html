<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚙️ 设置 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #fef0f5 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .page-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(242, 167, 179, 0.12);
        }
        .page-icon { font-size: 48px; margin-bottom: 8px; }
        .page-title { font-size: 22px; font-weight: 700; color: #d46b7a; }
        .page-subtitle { font-size: 12px; color: #b4868f; margin-top: 4px; }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 20px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #4a3538; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #4a3538; }
        .form-input {
            width: 100%; padding: 12px 14px; border: 1.5px solid #f0ced5;
            border-radius: 16px; font-size: 14px; font-family: inherit;
            background: #fffafb; transition: 0.2s;
        }
        .form-input:focus { border-color: #f2a7b3; outline: none; }
        .form-hint { font-size: 11px; color: #b4868f; margin-top: 4px; }
        
        .save-btn {
            width: 100%; background: #f2a7b3; color: white;
            font-size: 16px; font-weight: 600; padding: 14px;
            border-radius: 24px; border: none; cursor: pointer;
            font-family: inherit; margin-top: 8px;
        }
        .save-btn:active { transform: scale(0.98); }
        
        .id-selector { display: flex; gap: 10px; margin-top: 8px; }
        .id-option {
            flex: 1; padding: 12px; text-align: center;
            border: 2px solid #f0ced5; border-radius: 16px;
            cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .id-option.selected { border-color: #f2a7b3; background: #fff0f5; color: #d46b7a; }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: #c4939d; font-size: 11px;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-icon">⚙️</div>
        <div class="page-title">设置</div>
        <div class="page-subtitle">配置你们的专属信息</div>
    </div>

    <div class="card">
        <div class="card-title">💕 基本设置</div>
        
        <div class="form-group">
            <label class="form-label">恋爱开始日期</label>
            <input type="datetime-local" class="form-input" id="startDateInput">
            <div class="form-hint">计时器会从这个时间开始计算</div>
        </div>

        <div class="form-group">
            <label class="form-label">你的昵称</label>
            <input type="text" class="form-input" id="yourNameInput" placeholder="你的名字" maxlength="20">
        </div>

        <div class="form-group">
            <label class="form-label">对方昵称</label>
            <input type="text" class="form-input" id="partnerNameInput" placeholder="TA的名字" maxlength="20">
        </div>

        <div class="form-group">
            <label class="form-label">你的身份</label>
            <div class="id-selector">
                <div class="id-option" data-id="A">👧 A</div>
                <div class="id-option" data-id="B">👦 B</div>
            </div>
            <div class="form-hint">用于故事书的轮流写作，两人需要选择不同的身份</div>
        </div>

        <button class="save-btn" id="saveBtn">💾 保存设置</button>
    </div>

    <div class="card">
        <div class="card-title">📱 使用提示</div>
        <ul style="font-size: 13px; color: #7a5f63; line-height: 1.8; padding-left: 20px;">
            <li>两人需要选择<strong>不同的身份</strong>(A/B)才能正确轮流写故事</li>
            <li>修改设置后所有页面实时生效</li>
            <li>建议在手机浏览器打开，添加到主屏幕使用</li>
        </ul>
    </div>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="games.html" class="nav-item"><span class="nav-icon">🎮</span>游戏</a>
    <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    initFirebase();
    setupHeartEffect();

    const database = getDb();
    const settingsRef = database.ref('settings');

    let currentSettings = {
        startDate: "2025-06-01T20:00",
        yourName: "宝贝",
        partnerName: "乖乖",
        myId: "A"
    };

    function loadAndRender() {
        loadSettings((s) => {
            currentSettings = s;
            document.getElementById('startDateInput').value = s.startDate.substring(0, 16);
            document.getElementById('yourNameInput').value = s.yourName;
            document.getElementById('partnerNameInput').value = s.partnerName;
            
            document.querySelectorAll('.id-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.id === s.myId);
            });
        });
    }
    loadAndRender();

    document.querySelectorAll('.id-option').forEach(el => {
        el.onclick = () => {
            document.querySelectorAll('.id-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
        };
    });

    document.getElementById('saveBtn').onclick = () => {
        const startDate = document.getElementById('startDateInput').value;
        const yourName = document.getElementById('yourNameInput').value.trim();
        const partnerName = document.getElementById('partnerNameInput').value.trim();
        const selectedId = document.querySelector('.id-option.selected');
        const myId = selectedId ? selectedId.dataset.id : 'A';

        if (!yourName || !partnerName) {
            alert('请填写昵称哦~');
            return;
        }

        const newSettings = {
            startDate: startDate || "2025-06-01T20:00:00",
            yourName,
            partnerName,
            myId
        };

        settingsRef.set(newSettings).then(() => {
            alert('✅ 保存成功！');
        }).catch((e) => {
            alert('保存失败：' + e.message);
        });
    };
</script>
</body>
</html>
