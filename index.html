<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💕 我们的恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #fef0f5 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .hero {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 40px;
            padding: 32px 20px 28px;
            margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(242, 167, 179, 0.18);
        }
        .hero-icon { font-size: 64px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        h1 {
            font-size: 28px; font-weight: 700; margin: 16px 0 8px;
            background: linear-gradient(135deg, #d46b7a, #b85c6a);
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }
        .sub { color: #b4868f; font-size: 15px; margin-bottom: 20px; }
        
        .timer-grid {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 20px 0 16px;
        }
        .timer-unit {
            background: #fef2f5; border-radius: 20px; padding: 10px 14px; min-width: 64px; text-align: center;
        }
        .timer-number { font-size: 32px; font-weight: 800; color: #e37f8e; line-height: 1.1; }
        .timer-label { font-size: 11px; color: #c4939d; margin-top: 2px; }
        
        .anniversary {
            background: #fce4e8; display: inline-block; padding: 8px 20px; border-radius: 50px;
            font-size: 13px; font-weight: 600; color: #b85c6a; margin-top: 4px;
        }
        .anniversary.today { background: #f2a7b3; color: white; animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 8px rgba(242, 167, 179, 0.5); } 50% { box-shadow: 0 0 20px rgba(242, 167, 179, 0.8); } }
        
        .status-badge {
            font-size: 11px; background: #e9ecef; padding: 4px 12px; border-radius: 30px;
            display: inline-block; margin-top: 16px;
        }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        
        .menu-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 20px;
        }
        .menu-item {
            background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 20px 16px;
            text-align: center; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.6);
            text-decoration: none; color: inherit;
        }
        .menu-item:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); }
        .menu-item:active { transform: scale(0.97); }
        .menu-icon { font-size: 36px; margin-bottom: 8px; }
        .menu-title { font-size: 15px; font-weight: 600; color: #4a3538; }
        .menu-desc { font-size: 11px; color: #b4868f; margin-top: 4px; }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: #c4939d; font-size: 11px; transition: 0.2s;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="hero-icon">💕</div>
        <h1>恋爱小窝</h1>
        <div class="sub" id="coupleName">👦 宝贝 & 乖乖 👧</div>
        <div class="timer-grid">
            <div class="timer-unit"><div class="timer-number" id="days">0</div><div class="timer-label">天</div></div>
            <div class="timer-unit"><div class="timer-number" id="hours">0</div><div class="timer-label">时</div></div>
            <div class="timer-unit"><div class="timer-number" id="minutes">0</div><div class="timer-label">分</div></div>
            <div class="timer-unit"><div class="timer-number" id="seconds">0</div><div class="timer-label">秒</div></div>
        </div>
        <div class="anniversary" id="anniversaryBadge">🎀 距离一周年还有 ? 天</div>
        <span class="status-badge offline" id="connectionStatus">🔴 连接中...</span>
    </div>

    <div class="menu-grid">
        <a href="diary.html" class="menu-item">
            <div class="menu-icon">📝</div>
            <div class="menu-title">碎碎念</div>
            <div class="menu-desc">记录日常点滴</div>
        </a>
        <a href="photos.html" class="menu-item">
            <div class="menu-icon">📸</div>
            <div class="menu-title">照片墙</div>
            <div class="menu-desc">甜蜜回忆合集</div>
        </a>
        <a href="games.html" class="menu-item">
            <div class="menu-icon">🎮</div>
            <div class="menu-title">趣味游戏</div>
            <div class="menu-desc">故事书 · 情话盲盒等</div>
        </a>
        <a href="settings.html" class="menu-item">
            <div class="menu-icon">⚙️</div>
            <div class="menu-title">设置</div>
            <div class="menu-desc">配置个人信息</div>
        </a>
    </div>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="games.html" class="nav-item"><span class="nav-icon">🎮</span>游戏</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    initFirebase();
    
    const user = checkLogin();
    if (user) {
        loadSettings((settings) => {
            document.getElementById('coupleName').innerHTML = `👦 ${settings.yourName} & ${settings.partnerName} 👧`;
            startTimer(settings.startDate);
        });
        setupConnectionStatus();
        setupHeartEffect();
    }
</script>
</body>
</html>
