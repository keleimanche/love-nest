<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮 趣味游戏 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #fef0f5 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .page-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(242, 167, 179, 0.12);
        }
        .page-icon { font-size: 48px; margin-bottom: 8px; }
        .page-title { font-size: 22px; font-weight: 700; color: #d46b7a; }
        .page-subtitle { font-size: 12px; color: #b4868f; margin-top: 4px; }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
        }
        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(242, 167, 179, 0.1), transparent);
            opacity: 0;
            transition: 0.25s;
        }
        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(242, 167, 179, 0.2);
        }
        .game-card:hover::before { opacity: 1; }
        .game-card:active { transform: scale(0.97); }
        
        .game-icon {
            font-size: 42px;
            margin-bottom: 8px;
            display: block;
            position: relative;
            z-index: 1;
        }
        .game-name {
            font-size: 13px;
            font-weight: 600;
            color: #4a3538;
            position: relative;
            z-index: 1;
            margin-bottom: 4px;
        }
        .game-desc {
            font-size: 10px;
            color: #b4868f;
            position: relative;
            z-index: 1;
        }
        
        .game-card.disabled {
            opacity: 0.6;
            cursor: default;
            background: rgba(255, 255, 255, 0.5);
        }
        .game-card.disabled:hover {
            transform: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
        }
        .coming-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #f2a7b3;
            color: white;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 10px;
            z-index: 2;
        }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #c4939d;
            font-size: 11px;
            transition: 0.2s;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-icon">🎮</div>
        <div class="page-title">趣味游戏</div>
        <div class="page-subtitle">点击图标开始游戏 · 更多功能开发中</div>
    </div>

    <div class="games-grid">
        <!-- 已实现 -->
        <a href="story.html" class="game-card">
            <span class="game-icon">📖</span>
            <div class="game-name">故事书</div>
            <div class="game-desc">一人一句</div>
        </a>
        
        <a href="love-quotes.html" class="game-card">
            <span class="game-icon">💌</span>
            <div class="game-name">情话盲盒</div>
            <div class="game-desc">随机情话</div>
        </a>
        
        <!-- 即将推出 -->
        <a href="gacha.html" class="game-card">
            <span class="game-icon">🎰</span>
            <div class="game-name">扭蛋机</div>
            <div class="game-desc">每日任务</div>
        </a>
        
        <a href="time-capsule.html" class="game-card">
            <span class="game-icon">📬</span>
            <div class="game-name">时光胶囊</div>
            <div class="game-desc">给未来的信</div>
        </a>
        
        <a href="map.html" class="game-card">
            <span class="game-icon">🗺️</span>
            <div class="game-name">地图里程碑</div>
            <div class="game-desc">收集徽章</div>
        </a>
        
        <a href="feed-pig.html" class="game-card">
            <span class="game-icon">🐷</span>
            <div class="game-name">喂小猪</div>
            <div class="game-desc">一起喂养</div>
        </a>
        
        <a href="riddle.html" class="game-card">
            <span class="game-icon">🧩</span>
            <div class="game-name">猜谜语</div>
            <div class="game-desc">猜对有奖</div>
        </a>
        
        <a href="match3.html" class="game-card">
            <span class="game-icon">💕</span>
            <div class="game-name">爱心消除</div>
            <div class="game-desc">消消乐</div>
        </a>
        
        <div class="game-card disabled">
            <span class="coming-badge">即将推出</span>
            <span class="game-icon">🏆</span>
            <div class="game-name">排行榜</div>
            <div class="game-desc">爱的积分</div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="games.html" class="nav-item active"><span class="nav-icon">🎮</span>游戏</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    initFirebase();
    setupHeartEffect();
</script>
</body>
</html>
