<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💌 情话盲盒 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #fef0f5 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .page-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(242, 167, 179, 0.12);
        }
        .page-icon { font-size: 48px; margin-bottom: 8px; }
        .page-title { font-size: 22px; font-weight: 700; color: #d46b7a; }
        .page-subtitle { font-size: 12px; color: #b4868f; margin-top: 4px; }
        
        .quote-box {
            background: linear-gradient(145deg, #fff2f5, #ffe6ec);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(242, 167, 179, 0.15);
            transition: 0.3s;
        }
        .quote-text {
            font-size: 18px; font-weight: 500; line-height: 1.7;
            color: #a85f6b;
        }
        .quote-text.fade { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .open-btn {
            width: 100%; background: linear-gradient(135deg, #f2a7b3, #e88798);
            color: white; font-size: 18px; font-weight: 600;
            padding: 16px; border-radius: 30px; border: none;
            cursor: pointer; transition: 0.2s; font-family: inherit;
            box-shadow: 0 6px 20px rgba(232, 135, 152, 0.35);
        }
        .open-btn:active { transform: scale(0.97); }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: #c4939d; font-size: 11px;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-icon">💌</div>
        <div class="page-title">情话盲盒</div>
        <div class="page-subtitle">每次拆开都是一句甜甜的话</div>
    </div>

    <div class="quote-box">
        <span class="quote-text" id="quoteText">💝 戳下面的按钮，拆一句情话吧~</span>
    </div>

    <button class="open-btn" id="openBtn">🎁 拆开盲盒</button>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="story.html" class="nav-item"><span class="nav-icon">📖</span>故事</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    initFirebase();
    setupHeartEffect();

    const database = getDb();
    const quotesRef = database.ref('loveQuotes');
    
    const DEFAULT_QUOTES = [
        "✨ 你是我所有温柔的来源。",
        "🌙 和你在一起，每一天都发光。",
        "💕 有你在，连空气都是甜的。",
        "🏡 你在身边，就是最好的日子。",
        "🐻 喜欢你，从一而终，认真且怂。",
        "👀 世界那么大，我的眼里只有你。",
        "🍬 你笑起来比糖果还甜！",
        "💐 和你在一起，每天都是情人节。",
        "🚶‍♂️🚶‍♀️ 余生很长，想和你慢慢走。",
        "🎀 你永远是我的第一选择。",
        "🌟 遇见你，是我最美的意外。",
        "🌈 你是我藏在心里的星星。",
        "💝 想把你揉进怀里，藏一辈子。",
        "🦋 你比晚风更温柔。",
        "💫 你是我疲惫生活里的英雄梦想。"
    ];

    let quotes = [];
    let lastIdx = -1;
    const quoteEl = document.getElementById('quoteText');
    const openBtn = document.getElementById('openBtn');

    quotesRef.on('value', (snapshot) => {
        quotes = [];
        snapshot.forEach((child) => {
            const data = child.val();
            if (data && data.text) {
                quotes.push(data.text);
            }
        });
        
        if (quotes.length === 0) {
            quotes = DEFAULT_QUOTES;
        }
    });

    openBtn.onclick = () => {
        if (quotes.length === 0) {
            quoteEl.textContent = "💝 正在加载情话...";
            return;
        }
        
        let idx;
        do {
            idx = Math.floor(Math.random() * quotes.length);
        } while (idx === lastIdx && quotes.length > 1);
        lastIdx = idx;

        quoteEl.textContent = quotes[idx];
        quoteEl.classList.remove('fade');
        void quoteEl.offsetWidth;
        quoteEl.classList.add('fade');
    };
</script>
</body>
</html>
