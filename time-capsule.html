<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📬 时光胶囊信箱 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #f0f4ff 0%, #e8f0fe 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .page-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(100, 120, 200, 0.12);
        }
        .page-icon { font-size: 48px; margin-bottom: 8px; }
        .page-title { font-size: 22px; font-weight: 700; color: #6b7ad4; }
        .page-subtitle { font-size: 12px; color: #8b9dc3; margin-top: 4px; }
        
        .write-btn {
            width: 100%;
            background: linear-gradient(135deg, #7eb3f2, #6b7ad4);
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 14px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(107, 122, 212, 0.3);
            transition: 0.2s;
        }
        .write-btn:hover { transform: translateY(-2px); }
        
        .mailbox-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 20px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        .mailbox-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            background: #f2a7b3;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .letter-list { display: flex; flex-direction: column; gap: 12px; }
        .letter-empty {
            text-align: center;
            color: #8b9dc3;
            padding: 40px 20px;
            font-size: 14px;
        }
        
        .letter-card {
            background: linear-gradient(145deg, #fff, #fef8f0);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: 0.25s;
            border: 2px solid #f0e6d8;
            position: relative;
            overflow: hidden;
        }
        .letter-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); }
        
        .letter-card.sealed {
            background: linear-gradient(145deg, #f8f0ff, #f0e6ff);
            border-color: #d4c4f4;
        }
        .letter-card.sealed::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(180, 140, 255, 0.15) 0%, transparent 50%);
            animation: glow 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .letter-card.ready {
            background: linear-gradient(145deg, #fff5e6, #fff0d8);
            border-color: #f2a7b3;
            animation: pulse-border 2s ease-in-out infinite;
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(242, 167, 179, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(242, 167, 179, 0); }
        }
        
        .letter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .letter-icon { font-size: 28px; }
        .letter-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        .letter-status.sealed { background: #e8dcf8; color: #8b6bb5; }
        .letter-status.ready { background: #fce4e8; color: #d46b7a; }
        
        .letter-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a3538;
        }
        .letter-meta {
            font-size: 12px;
            color: #8b9dc3;
        }
        .letter-countdown {
            font-size: 13px;
            color: #d46b7a;
            font-weight: 600;
            margin-top: 4px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 24px;
            max-width: 420px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            color: #6b7ad4;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a3538;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dce4f0;
            border-radius: 16px;
            font-size: 14px;
            font-family: inherit;
            background: #fafbfc;
            transition: 0.2s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: #7eb3f2;
            outline: none;
        }
        .form-textarea {
            resize: none;
            min-height: 120px;
        }
        .form-hint { font-size: 11px; color: #8b9dc3; margin-top: 4px; }
        
        .trigger-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .trigger-option {
            padding: 8px 14px;
            border: 1.5px solid #dce4f0;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }
        .trigger-option.selected {
            border-color: #7eb3f2;
            background: #f0f4ff;
            color: #6b7ad4;
        }
        
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .modal-btn.primary { background: #7eb3f2; color: white; }
        .modal-btn.secondary { background: #f0f0f0; color: #666; }
        
        .letter-body {
            background: #fffbf5;
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            font-size: 15px;
            line-height: 1.8;
            color: #4a3538;
            border: 1px solid #f0e6d8;
        }
        
        .letter-opened {
            text-align: center;
            padding: 10px;
            color: #8b9dc3;
            font-size: 13px;
        }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #c4939d;
            font-size: 11px;
        }
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-icon">📬</div>
        <div class="page-title">时光胶囊信箱</div>
        <div class="page-subtitle">写给未来的TA · 时间到了才能拆开</div>
    </div>

    <button class="write-btn" id="writeBtn">✍️ 写一封时光信</button>

    <div class="mailbox-section">
        <div class="mailbox-title">
            📬 我的信箱
            <span class="badge" id="readyBadge" style="display: none;">有新信件</span>
        </div>
        <div class="letter-list" id="letterList">
            <div class="letter-empty">📭 信箱空空如也~<br>写第一封信给未来的TA吧 ✨</div>
        </div>
    </div>
</div>

<!-- 写信弹窗 -->
<div class="modal" id="writeModal">
    <div class="modal-content">
        <div class="modal-title">✉️ 写一封时光信</div>
        
        <div class="form-group">
            <label class="form-label">信件标题</label>
            <input type="text" class="form-input" id="letterTitleInput" placeholder="给TA的一封信" maxlength="50">
        </div>
        
        <div class="form-group">
            <label class="form-label">信件内容</label>
            <textarea class="form-textarea" id="letterContentInput" placeholder="写下想对TA说的话..."></textarea>
        </div>
        
        <div class="form-group">
            <label class="form-label">打开方式</label>
            <div class="trigger-options" id="triggerOptions">
                <div class="trigger-option selected" data-trigger="date">📅 指定日期</div>
                <div class="trigger-option" data-trigger="meet">见面时</div>
                <div class="trigger-option" data-trigger="makeup">和好后</div>
                <div class="trigger-option" data-trigger="anniversary">纪念日</div>
            </div>
        </div>
        
        <div class="form-group" id="dateGroup">
            <label class="form-label">打开日期</label>
            <input type="datetime-local" class="form-input" id="openDateInput">
            <div class="form-hint">信件将在这个时间后才能拆开</div>
        </div>
        
        <div class="modal-btns">
            <button class="modal-btn secondary" id="cancelWriteBtn">取消</button>
            <button class="modal-btn primary" id="sendLetterBtn">📬 封存信件</button>
        </div>
    </div>
</div>

<!-- 阅读弹窗 -->
<div class="modal" id="readModal">
    <div class="modal-content">
        <div class="modal-title" id="readTitle">信件标题</div>
        <div class="letter-body" id="readContent">信件内容</div>
        <div class="letter-opened" id="readMeta"></div>
        <div class="modal-btns">
            <button class="modal-btn secondary" id="deleteLetterBtn">🗑️ 删除</button>
            <button class="modal-btn primary" id="closeReadBtn">关闭</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="games.html" class="nav-item"><span class="nav-icon">🎮</span>游戏</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    initFirebase();
    setupHeartEffect();

    const database = getDb();
    const lettersRef = database.ref('timeCapsule');

    let letters = [];
    let currentLetter = null;
    let selectedTrigger = 'date';

    const writeModal = document.getElementById('writeModal');
    const readModal = document.getElementById('readModal');
    const letterList = document.getElementById('letterList');
    const readyBadge = document.getElementById('readyBadge');

    function render() {
        const now = Date.now();
        const readyLetters = letters.filter(l => l.openTime <= now && !l.read);
        
        if (readyLetters.length > 0) {
            readyBadge.style.display = 'inline';
            readyBadge.textContent = `${readyLetters.length}封新信件`;
            playNotification();
        } else {
            readyBadge.style.display = 'none';
        }

        if (letters.length === 0) {
            letterList.innerHTML = '<div class="letter-empty">📭 信箱空空如也~<br>写第一封信给未来的TA吧 ✨</div>';
            return;
        }

        letterList.innerHTML = '';
        letters.sort((a, b) => a.openTime - b.openTime).forEach(letter => {
            const div = document.createElement('div');
            const isReady = letter.openTime <= now;
            const isSealed = !isReady;
            
            div.className = `letter-card ${isSealed ? 'sealed' : ''} ${isReady && !letter.read ? 'ready' : ''}`;
            
            const triggerLabels = {
                date: '📅 指定日期',
                meet: '🤝 见面时',
                makeup: '💕 和好后',
                anniversary: '🎉 纪念日'
            };

            const openDate = new Date(letter.openTime);
            const createDate = new Date(letter.createTime);
            
            let countdown = '';
            if (isSealed) {
                const diff = letter.openTime - now;
                const days = Math.floor(diff / (24 * 60 * 60 * 1000));
                const hours = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
                if (days > 0) countdown = `还有 ${days} 天 ${hours} 小时`;
                else countdown = `还有 ${hours} 小时`;
            }

            div.innerHTML = `
                <div class="letter-header">
                    <span class="letter-icon">${isSealed ? '✉️' : '💌'}</span>
                    <span class="letter-status ${isSealed ? 'sealed' : 'ready'}">${isSealed ? '封存中' : (letter.read ? '已读' : '可拆封')}</span>
                </div>
                <div class="letter-title">${escapeHtml(letter.title)}</div>
                <div class="letter-meta">${triggerLabels[letter.trigger]} · ${createDate.toLocaleDateString('zh-CN')}</div>
                ${countdown ? `<div class="letter-countdown">${countdown}</div>` : ''}
            `;

            div.onclick = () => openLetter(letter);
            letterList.appendChild(div);
        });
    }

    function openLetter(letter) {
        currentLetter = letter;
        const now = Date.now();
        
        if (letter.openTime > now) {
            alert('🔒 这封信还没到时间哦，不能偷看~');
            return;
        }

        document.getElementById('readTitle').textContent = letter.title;
        document.getElementById('readContent').textContent = letter.content;
        
        const openDate = new Date(letter.openTime);
        document.getElementById('readMeta').textContent = 
            `写信时间: ${new Date(letter.createTime).toLocaleString('zh-CN')}\n拆封时间: ${openDate.toLocaleString('zh-CN')}`;

        if (!letter.read) {
            lettersRef.child(letter.id).update({ read: true });
        }

        readModal.classList.add('show');
    }

    function playNotification() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.5);
        } catch (e) {}
    }

    lettersRef.on('value', (snap) => {
        letters = [];
        snap.forEach(child => {
            letters.push({ id: child.key, ...child.val() });
        });
        render();
    });

    document.getElementById('writeBtn').onclick = () => {
        writeModal.classList.add('show');
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(12, 0, 0, 0);
        document.getElementById('openDateInput').value = tomorrow.toISOString().slice(0, 16);
    };

    document.getElementById('cancelWriteBtn').onclick = () => {
        writeModal.classList.remove('show');
    };

    document.querySelectorAll('.trigger-option').forEach(el => {
        el.onclick = () => {
            document.querySelectorAll('.trigger-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedTrigger = el.dataset.trigger;
            document.getElementById('dateGroup').style.display = 
                selectedTrigger === 'date' ? 'block' : 'none';
        };
    });

    document.getElementById('sendLetterBtn').onclick = () => {
        const title = document.getElementById('letterTitleInput').value.trim();
        const content = document.getElementById('letterContentInput').value.trim();
        
        if (!title || !content) {
            alert('请填写标题和内容~');
            return;
        }

        let openTime = Date.now() + 365 * 24 * 60 * 60 * 1000;
        
        if (selectedTrigger === 'date') {
            const dateStr = document.getElementById('openDateInput').value;
            if (!dateStr) {
                alert('请选择打开日期~');
                return;
            }
            openTime = new Date(dateStr).getTime();
        } else if (selectedTrigger === 'meet') {
            openTime = Date.now() + 7 * 24 * 60 * 60 * 1000;
        } else if (selectedTrigger === 'makeup') {
            openTime = Date.now() + 3 * 24 * 60 * 60 * 1000;
        } else if (selectedTrigger === 'anniversary') {
            openTime = Date.now() + 30 * 24 * 60 * 60 * 1000;
        }

        lettersRef.push({
            title,
            content,
            trigger: selectedTrigger,
            openTime,
            createTime: Date.now(),
            read: false
        });

        document.getElementById('letterTitleInput').value = '';
        document.getElementById('letterContentInput').value = '';
        writeModal.classList.remove('show');
        alert('✉️ 信件已封存！时间到了会提醒你哦~');
    };

    document.getElementById('closeReadBtn').onclick = () => {
        readModal.classList.remove('show');
    };

    document.getElementById('deleteLetterBtn').onclick = () => {
        if (confirm('确定删除这封信吗？')) {
            lettersRef.child(currentLetter.id).remove();
            readModal.classList.remove('show');
        }
    };

    render();
</script>
</body>
</html>
