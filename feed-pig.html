<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐷 喂小猪 - 恋爱小窝</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #fef0f5 100%);
            background-attachment: fixed;
            color: #4a3538;
            min-height: 100vh;
            padding: 20px 16px 80px;
            user-select: none;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .page-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(242, 167, 179, 0.12);
        }
        .page-icon { font-size: 48px; margin-bottom: 8px; }
        .page-title { font-size: 22px; font-weight: 700; color: #d46b7a; }
        .page-subtitle { font-size: 12px; color: #b4868f; margin-top: 4px; }
        
        .pig-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 28px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(242, 167, 179, 0.12);
            text-align: center;
        }
        
        .pig-container {
            position: relative;
            display: inline-block;
            margin: 20px 0;
        }
        
        .pig-body {
            width: 180px;
            height: 150px;
            background: linear-gradient(135deg, #FFB6C1 0%, #FFC0CB 50%, #FFB6C1 100%);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            transition: transform 0.3s ease;
        }
        
        .pig-ear {
            position: absolute;
            width: 50px;
            height: 60px;
            background: linear-gradient(135deg, #FF9AA2, #FFB6C1);
            border-radius: 50% 50% 0 0;
            top: -30px;
        }
        
        .pig-ear.left {
            left: 20px;
            transform: rotate(-30deg);
        }
        
        .pig-ear.right {
            right: 20px;
            transform: rotate(30deg);
        }
        
        .pig-ear::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 40px;
            background: #FFCCE0;
            border-radius: 50% 50% 0 0;
            top: 10px;
            left: 10px;
        }
        
        .pig-eye {
            position: absolute;
            width: 24px;
            height: 30px;
            background: #2C1810;
            border-radius: 50%;
            top: 35px;
        }
        
        .pig-eye.left {
            left: 35px;
        }
        
        .pig-eye.right {
            right: 35px;
        }
        
        .pig-eye::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 6px;
            left: 6px;
        }
        
        .pig-cheek {
            position: absolute;
            width: 35px;
            height: 20px;
            background: rgba(255, 150, 170, 0.6);
            border-radius: 50%;
            top: 55px;
        }
        
        .pig-cheek.left {
            left: 10px;
        }
        
        .pig-cheek.right {
            right: 10px;
        }
        
        .pig-nose {
            position: absolute;
            width: 60px;
            height: 40px;
            background: linear-gradient(135deg, #FF9AA2, #FFB6C1);
            border-radius: 50%;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 2px 8px rgba(200, 100, 120, 0.3);
        }
        
        .pig-nostril {
            position: absolute;
            width: 12px;
            height: 16px;
            background: #D4858F;
            border-radius: 50%;
            top: 12px;
        }
        
        .pig-nostril.left {
            left: 12px;
        }
        
        .pig-nostril.right {
            right: 12px;
        }
        
        .pig-expression {
            position: absolute;
            top: -10px;
            right: -20px;
            font-size: 40px;
            animation: bounce 2s infinite;
            z-index: 10;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .food-fly {
            position: absolute;
            top: 0;
            left: 50%;
            font-size: 40px;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        
        @keyframes flyToMouth {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            50% { opacity: 1; transform: translate(20px, -60px) scale(1.4); }
            100% { opacity: 0; transform: translate(50px, -100px) scale(0.3); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }
        
        .pig-shake {
            animation: shake 0.5s infinite;
        }
        
        .pig-body.pig-eat {
            animation: eat 0.3s ease;
        }
        
        @keyframes eat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .hunger-section {
            margin: 20px 0;
        }
        
        .hunger-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #b4868f;
            margin-bottom: 8px;
        }
        
        .hunger-bar {
            background: #fce4e8;
            border-radius: 20px;
            height: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(180, 120, 130, 0.15);
        }
        
        .hunger-fill {
            height: 100%;
            background: linear-gradient(90deg, #f2a7b3, #e88798);
            border-radius: 20px;
            transition: width 0.5s ease;
            position: relative;
        }
        
        .hunger-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            border-radius: 20px;
        }
        
        .pig-status {
            font-size: 16px;
            color: #d46b7a;
            margin: 16px 0;
            font-weight: 600;
            min-height: 24px;
        }
        
        .food-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        
        .food-btn {
            background: white;
            border: 2px solid #fce4e8;
            border-radius: 20px;
            padding: 16px 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .food-btn:hover {
            transform: translateY(-4px) scale(1.05);
            border-color: #f2a7b3;
            box-shadow: 0 8px 20px rgba(242, 167, 179, 0.3);
        }
        
        .food-btn:active {
            transform: scale(0.95);
        }
        
        .food-emoji {
            font-size: 36px;
        }
        
        .food-value {
            font-size: 11px;
            color: #b4868f;
            font-weight: 600;
        }
        
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
        }
        
        .stats-title {
            font-size: 14px;
            font-weight: 600;
            color: #d46b7a;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .stat-item {
            text-align: center;
            background: #fef2f5;
            border-radius: 16px;
            padding: 12px 8px;
        }
        
        .stat-label {
            font-size: 11px;
            color: #b4868f;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #f2a7b3;
            margin-top: 4px;
        }
        
        .tip-text {
            font-size: 12px;
            color: #ccb0b6;
            text-align: center;
            margin-top: 16px;
        }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #c4939d;
            font-size: 11px;
            transition: 0.2s;
        }
        
        .nav-item.active { color: #f2a7b3; }
        .nav-icon { font-size: 22px; }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 16px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #d46b7a;
            font-weight: 600;
        }
        
        .toast.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-icon">🐷</div>
        <div class="page-title">喂小猪</div>
        <div class="page-subtitle">两人一起喂养 · 实时同步</div>
    </div>
    
    <div class="pig-card">
        <div class="pig-container" id="pigContainer">
            <div class="pig-body" id="pigBody">
                <div class="pig-ear left"></div>
                <div class="pig-ear right"></div>
                <div class="pig-eye left" id="pigEyeLeft"></div>
                <div class="pig-eye right" id="pigEyeRight"></div>
                <div class="pig-cheek left"></div>
                <div class="pig-cheek right"></div>
                <div class="pig-nose">
                    <div class="pig-nostril left"></div>
                    <div class="pig-nostril right"></div>
                </div>
            </div>
            <div class="pig-expression" id="pigExpression">😊</div>
            <div class="food-fly" id="foodFly"></div>
        </div>
        
        <div class="hunger-section">
            <div class="hunger-label">
                <span>饱食度</span>
                <span id="hungerPercent">50%</span>
            </div>
            <div class="hunger-bar">
                <div class="hunger-fill" id="hungerFill" style="width: 50%;"></div>
            </div>
        </div>
        
        <div class="pig-status" id="pigStatus">🐽 有点饿了呢~</div>
        
        <div class="food-grid">
            <button class="food-btn" data-food="🍎" data-value="10">
                <span class="food-emoji">🍎</span>
                <span class="food-value">+10</span>
            </button>
            <button class="food-btn" data-food="🥕" data-value="12">
                <span class="food-emoji">🥕</span>
                <span class="food-value">+12</span>
            </button>
            <button class="food-btn" data-food="🍩" data-value="15">
                <span class="food-emoji">🍩</span>
                <span class="food-value">+15</span>
            </button>
            <button class="food-btn" data-food="🍕" data-value="18">
                <span class="food-emoji">🍕</span>
                <span class="food-value">+18</span>
            </button>
            <button class="food-btn" data-food="🍰" data-value="20">
                <span class="food-emoji">🍰</span>
                <span class="food-value">+20</span>
            </button>
            <button class="food-btn" data-food="🍔" data-value="22">
                <span class="food-emoji">🍔</span>
                <span class="food-value">+22</span>
            </button>
            <button class="food-btn" data-food="🍜" data-value="25">
                <span class="food-emoji">🍜</span>
                <span class="food-value">+25</span>
            </button>
            <button class="food-btn" data-food="🍱" data-value="30">
                <span class="food-emoji">🍱</span>
                <span class="food-value">+30</span>
            </button>
        </div>
        
        <div class="tip-text">点击食物喂小猪，它会开心哦~<br>饱食度满了需要消化，过一会又会饿</div>
    </div>
    
    <div class="stats-card">
        <div class="stats-title">📊 喂养统计</div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">总喂食次数</div>
                <div class="stat-value" id="totalFeeds">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">你的喂食</div>
                <div class="stat-value" id="myFeeds">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">TA的喂食</div>
                <div class="stat-value" id="partnerFeeds">0</div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="nav-bar">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>主页</a>
    <a href="diary.html" class="nav-item"><span class="nav-icon">📝</span>碎碎念</a>
    <a href="games.html" class="nav-item active"><span class="nav-icon">🎮</span>游戏</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>设置</a>
</div>

<script src="common.js"></script>
<script>
    const pigRef = db.ref('pig');
    
    const pigContainer = document.getElementById('pigContainer');
    const pigBody = document.getElementById('pigBody');
    const pigExpression = document.getElementById('pigExpression');
    const pigEyeLeft = document.getElementById('pigEyeLeft');
    const pigEyeRight = document.getElementById('pigEyeRight');
    const hungerFill = document.getElementById('hungerFill');
    const hungerPercent = document.getElementById('hungerPercent');
    const pigStatus = document.getElementById('pigStatus');
    const foodFly = document.getElementById('foodFly');
    const totalFeedsEl = document.getElementById('totalFeeds');
    const myFeedsEl = document.getElementById('myFeeds');
    const partnerFeedsEl = document.getElementById('partnerFeeds');
    const toastEl = document.getElementById('toast');
    
    let pigData = {
        hunger: 50,
        lastFed: Date.now(),
        totalFeeds: 0,
        myFeeds: 0,
        partnerFeeds: 0
    };
    
    const myId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('userId', myId);
    
    function initPig() {
        pigRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                pigData = { ...pigData, ...data };
                
                // 自动饥饿（每分钟减2点）
                if (pigData.lastFed) {
                    const minutes = (Date.now() - pigData.lastFed) / 60000;
                    if (minutes >= 1) {
                        const decrease = Math.floor(minutes * 2);
                        pigData.hunger = Math.max(0, pigData.hunger - decrease);
                        pigRef.update({
                            hunger: pigData.hunger,
                            lastFed: Date.now()
                        });
                    }
                }
            } else {
                pigRef.set({
                    hunger: 50,
                    lastFed: Date.now(),
                    totalFeeds: 0,
                    myFeeds: 0,
                    partnerFeeds: 0
                });
            }
            updatePigUI();
        });
    }
    
    function updatePigUI() {
        const hunger = pigData.hunger;
        hungerFill.style.width = hunger + '%';
        hungerPercent.textContent = hunger + '%';
        
        totalFeedsEl.textContent = pigData.totalFeeds || 0;
        myFeedsEl.textContent = pigData.myFeeds || 0;
        partnerFeedsEl.textContent = pigData.partnerFeeds || 0;
        
        // 移除所有动画类
        pigContainer.classList.remove('pig-shake');
        
        if (hunger >= 100) {
            pigExpression.textContent = '😵';
            pigStatus.textContent = '😵 吃撑了！需要消化一下...';
            pigContainer.classList.add('pig-shake');
            hungerFill.style.background = 'linear-gradient(90deg, #ff6b6b, #ee5a52)';
        } else if (hunger >= 80) {
            pigExpression.textContent = '😋';
            pigStatus.textContent = '😋 饱饱的，好幸福~';
            hungerFill.style.background = 'linear-gradient(90deg, #4CAF50, #45a049)';
        } else if (hunger >= 60) {
            pigExpression.textContent = '😊';
            pigStatus.textContent = '😊 刚刚好，开心~';
            hungerFill.style.background = 'linear-gradient(90deg, #f2a7b3, #e88798)';
        } else if (hunger >= 40) {
            pigExpression.textContent = '😐';
            pigStatus.textContent = '😐 还可以，再来点也可以';
            hungerFill.style.background = 'linear-gradient(90deg, #f2a7b3, #e88798)';
        } else if (hunger >= 20) {
            pigExpression.textContent = '😟';
            pigStatus.textContent = '😟 有点饿了...';
            hungerFill.style.background = 'linear-gradient(90deg, #ffa726, #ff9800)';
        } else {
            pigExpression.textContent = '😢';
            pigStatus.textContent = '😢 饿坏了！快喂喂我吧~';
            hungerFill.style.background = 'linear-gradient(90deg, #ff6b6b, #ee5a52)';
        }
    }
    
    function feedPig(food, value) {
        // 如果已经满了，不允许喂食
        if (pigData.hunger >= 100) {
            showToast('😵 小猪吃撑了，等消化一下吧~');
            return;
        }
        
        const newHunger = Math.min(100, pigData.hunger + value);
        
        pigRef.update({
            hunger: newHunger,
            lastFed: Date.now(),
            totalFeeds: (pigData.totalFeeds || 0) + 1,
            myFeeds: (pigData.myFeeds || 0) + 1
        });
        
        // 飞行动画
        foodFly.textContent = food;
        foodFly.style.opacity = '1';
        foodFly.style.animation = 'flyToMouth 0.8s ease-out forwards';
        setTimeout(() => {
            foodFly.style.opacity = '0';
            foodFly.style.animation = '';
        }, 800);
        
        // 吃食动画
        pigBody.classList.add('pig-eat');
        setTimeout(() => pigBody.classList.remove('pig-eat'), 300);
        
        showToast(`${food} 真好吃！饱食度 +${value}`);
    }
    
    function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2000);
    }
    
    document.querySelectorAll('.food-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const food = btn.dataset.food;
            const value = parseInt(btn.dataset.value);
            feedPig(food, value);
        });
    });
    
    initFirebase();
    setupHeartEffect();
    initPig();
    
    // 每分钟检查一次
    setInterval(() => {
        updatePigUI();
    }, 60000);
</script>
</body>
</html>
